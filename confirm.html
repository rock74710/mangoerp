<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>確認訂單 - 芒果訂購</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="confirm">

  <div class="header">
    <h1>🥭 芒果訂購表單</h1>
    <div class="subtitle">2026 產季預購</div>
    <div class="steps">
      <div class="step done">
        <div class="step-num">✓</div>
        填寫資料
      </div>
      <div class="step-arrow">›</div>
      <div class="step active">
        <div class="step-num">2</div>
        確認訂單
      </div>
      <div class="step-arrow">›</div>
      <div class="step">
        <div class="step-num">3</div>
        完成送出
      </div>
    </div>
  </div>

  <div class="container" id="summary-container">

    <!-- 數量摘要 -->
    <div class="card">
      <div class="card-title">🥭 訂購數量</div>
      <div class="summary-qty">
        <div class="qty-badge">
          <div class="qty-type">12A-1300元/箱</div>
          <div class="qty-num" id="qty12A-display">0</div>
          <div class="qty-unit">箱</div>
        </div>
        <div class="qty-badge">
          <div class="qty-type">15A-1150元/箱</div>
          <div class="qty-num" id="qty15A-display">0</div>
          <div class="qty-unit">箱</div>
        </div>
        <div class="qty-badge">
          <div class="qty-type">18A-1050元/箱</div>
          <div class="qty-num" id="qty18A-display">0</div>
          <div class="qty-unit">箱</div>
        </div>
        <div class="qty-badge">
          <div class="qty-type">20A-950元/箱</div>
          <div class="qty-num" id="qty20A-display">0</div>
          <div class="qty-unit">箱</div>
        </div>
        <div class="qty-badge">
          <div class="qty-type">NG-700元/箱</div>
          <div class="qty-num" id="qtyNG-display">0</div>
          <div class="qty-unit">箱</div>
        </div>
      </div>
      <div id="summary-amount"></div>
    </div>

    <!-- 收件人資訊 -->
    <div class="card">
      <div class="card-title">📋 訂單資訊</div>
      <div id="summary-info"></div>
    </div>

    <!-- 匯款資訊 -->
    <div class="card">
      <div class="card-title">💳 匯款資訊</div>
      <div class="payment-info">
        <div class="payment-row">
          <span class="payment-label">銀行</span>
          <span class="payment-value">合作金庫 006</span>
        </div>
        <div class="payment-row">
          <span class="payment-label">帳號</span>
          <span class="payment-value account-no">5838872183312</span>
        </div>
        <div class="payment-row">
          <span class="payment-label">戶名</span>
          <span class="payment-value">柯森陽</span>
        </div>
        <div class="payment-row payment-amount-row">
          <span class="payment-label">應付金額</span>
          <span class="payment-value" id="payment-total">—</span>
        </div>
      </div>
      <div class="field payment-digits-field">
        <label for="transferDigits">匯款末五碼 <span class="optional">（選填）</span></label>
        <input type="text" id="transferDigits" placeholder="請填入您的匯款末五碼" inputmode="numeric" maxlength="5">
        <div class="field-note">填寫後方便我們核對匯款，加速處理訂單</div>
      </div>
      <div class="payment-line-hint">
        如有任何問題，歡迎透過 <a href="https://line.me/R/ti/p/@220cqjqs" target="_blank" rel="noopener" class="line-link">LINE 聯絡我們 🟢</a>
      </div>
    </div>

    <div class="notice">
      ⚠️ 請確認以上資訊正確，送出後將無法修改
    </div>

    <div class="alert-error" id="alert-error"></div>

    <button class="btn-submit" id="btn-confirm">
      <span class="btn-text">確認送出訂單</span>
      <span class="spinner"></span>
    </button>

    <button class="btn-back" id="btn-back">← 返回修改</button>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
